<!DOCTYPE html>                                                                                                                       
  <html>                                                                                                                                
  <head>                                                    
    <title>Sign in complete</title>
    <style>
      body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
             justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
      .card { background: #fff; border-radius: 10px; padding: 32px; max-width: 460px;
              width: 90%; box-shadow: 0 2px 16px rgba(0,0,0,0.1); text-align: center; }
      h2 { margin: 0 0 8px; font-size: 20px; }
      p  { color: #666; font-size: 14px; margin: 0 0 16px; }
      .code-box { background: #f0f4ff; border: 1px solid #c5d3ff; border-radius: 6px;
                  padding: 14px; font-family: monospace; font-size: 12px;
                  word-break: break-all; text-align: left; margin-bottom: 16px;
                  user-select: all; cursor: text; }
      .btn { background: #4285f4; color: #fff; border: none; border-radius: 6px;
             padding: 10px 28px; font-size: 14px; font-weight: 500; cursor: pointer; }
      .btn:hover { background: #5a97f5; }
      .error { color: #ea4335; }
    </style>
  </head>
  <body>
  <div class="card" id="card"><p>Loading…</p></div>
  <script>
    const q = new URLSearchParams(window.location.search);
    const code  = q.get('code');
    const error = q.get('error');
    const card  = document.getElementById('card');

    if (error) {
      card.innerHTML = '<h2 class="error">Sign-in failed</h2><p>' + error + '</p>';
    } else if (code) {
      card.innerHTML = `
        <h2>&#10003; Almost done!</h2>
        <p>Copy this code and paste it into the Figma plugin:</p>
        <div class="code-box" id="codeBox">${code}</div>
        <button class="btn" onclick="copyCode()">Copy Code</button>
        <p style="margin-top:16px; font-size:12px; color:#999;">You can close this tab after copying.</p>`;
    } else {
      card.innerHTML = '<p>No code found in URL.</p>';
    }

    function copyCode() {
      navigator.clipboard.writeText(document.getElementById('codeBox').textContent).then(() => {
        document.querySelector('.btn').textContent = '✓ Copied!';
      });
    }
  </script>
  </body>
  </html>
